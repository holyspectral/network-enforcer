apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
# A frontend that curls the backend every 5s
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: busybox:1.37
          command: ["sh", "-c", "while true; do wget -q -O- http://backend.demo:8080 || true; sleep 5; done"]
---
# Backend reachable by frontend, talks to postgres
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              while true; do
                echo "pinging postgres"
                wget -q -O- http://postgres.demo:5432 || true
                sleep 10
              done
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: demo
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
# Simulates a database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: demo
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: busybox:1.37
          command: ["sh", "-c", "while true; do sleep 30; done"]
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: demo
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
