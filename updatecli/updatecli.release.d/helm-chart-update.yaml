name: Update NetworkEnforcer chart versions

sources:
  chartVersion:
    name: "Get latest network-enforcer helm version"
    kind: yaml
    transformers:
      - semverinc: patch
    spec:
      file: charts/network-enforcer/Chart.yaml
      key: $.version
  releaseVersion:
    name: "Get latest network-enforcer version"
    kind: githubrelease
    spec:
      owner: '{{ requiredEnv .github.owner }}'
      repository: network-enforcer
      token: '{{ requiredEnv .github.token }}'
      typefilter: # Getting both pre-releases and releases
        prerelease: true
        release: true
      versionfilter:
        kind: "semver"
        pattern: ">=v0.0.0-0" # -0 suffix is required to get prerelease

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.author }}"
      email: "{{ .github.email }}"
      directory: "/tmp/helm-charts"
      owner: "{{ requiredEnv .github.owner }}"
      repository: "network-enforcer"
      token: "{{ requiredEnv .github.token }}"
      username: "{{ requiredEnv .github.user }}"
      branch: "{{ .github.branch }}"
      commitusingapi: true
      commitmessage:
        type: "chore"
        title: "update network enforcer helm charts"
        hidecredit: true
        footers: "Signed-off-by: NetworkEnforcer bot <network-enforcer-bot@users.noreply.github.com>"

conditions:
  release:
    name: Check if the latest network-enforcer release is an official release
    disablesourceinput: true
    kind: shell
    spec:
      command: '! echo {{ source `releaseVersion` }} | grep -E "v[0-9]+\.[0-9]+\.[0-9]+-([0-9A-Za-z-]+\.)*[0-9A-Za-z-]+"'

actions:
  default:
    title: 'chore: helm chart {{ source "chartVersion" }} release'
    kind: github/pullrequest
    scmid: default
    spec:
      automerge: false
      mergemethod: squash
      description: |
        Automatic Helm chart {{ source "chartVersion" }} update.
        This PR has been created by the automation used to automatically update the Helm charts when NetworkEnforcer is released or helm chart content is updated.
        REMEMBER IF YOU WANT TO MERGE IN A SINGLE COMMIT CHANGES AND VERSION BUMP, YOU MUST SQUASH THE COMMIT BEFORE MERGING THIS PR!
      draft: false
      labels:
        - "chore"

targets:
  update_helm_version:
    scmid: default
    name: update Helm chart version
    kind: yaml
    sourceid: chartVersion
    spec:
      file: charts/network-enforcer/Chart.yaml
      key: $.version
  update_appversion:
    scmid: default
    name: update Helm chart appVersion
    kind: yaml
    sourceid: releaseVersion
    spec:
      file: charts/network-enforcer/Chart.yaml
      key: $.appVersion
  update_controller_version:
    scmid: default
    name: update Helm chart controller version
    kind: yaml
    sourceid: releaseVersion
    spec:
      file: charts/network-enforcer/values.yaml
      key: $.controller.image.tag
  update_cniwatcher_version:
    scmid: default
    name: update Helm chart cniwatcher version
    kind: yaml
    sourceid: releaseVersion
    spec:
      file: charts/network-enforcer/values.yaml
      key: $.cniwatcher.image.tag
