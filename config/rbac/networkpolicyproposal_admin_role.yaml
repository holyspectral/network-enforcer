# This rule is not used by the project network-enforcer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over security.security.rancher.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: network-enforcer
    app.kubernetes.io/managed-by: kustomize
  name: networkpolicyproposal-admin-role
rules:
- apiGroups:
  - security.security.rancher.io
  resources:
  - networkpolicyproposals
  verbs:
  - '*'
- apiGroups:
  - security.security.rancher.io
  resources:
  - networkpolicyproposals/status
  verbs:
  - get
