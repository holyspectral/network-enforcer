# This rule is not used by the project network-enforcer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the security.security.rancher.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: network-enforcer
    app.kubernetes.io/managed-by: kustomize
  name: networkpolicyproposal-editor-role
rules:
- apiGroups:
  - security.security.rancher.io
  resources:
  - networkpolicyproposals
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - security.security.rancher.io
  resources:
  - networkpolicyproposals/status
  verbs:
  - get
