apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "network-enforcer.fullname" . }}-controller-rolebinding
  labels:
  {{- include "network-enforcer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "network-enforcer.fullname" . }}-controller'
subjects:
- kind: ServiceAccount
  name: '{{ include "network-enforcer.fullname" . }}-controller-manager'
  namespace: '{{ .Release.Namespace }}'
