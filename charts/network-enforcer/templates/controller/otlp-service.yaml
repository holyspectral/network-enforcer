apiVersion: v1
kind: Service
metadata:
  name: {{ include "network-enforcer.fullname" . }}-otlp
  labels:
  {{- include "network-enforcer.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: controller
  {{- include "network-enforcer.selectorLabels" . | nindent 4 }}
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
