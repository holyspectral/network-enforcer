{{- if .Values.obi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: network-enforcer-obi-config
  labels:
  {{- include "network-enforcer.labels" . | nindent 4 }}
data:
  ebpf-instrument-config.yml: |
    otel_metrics_export:
      endpoint: http://{{ include "network-enforcer.fullname" . }}-otlp:4317
    otel_traces_export:
      endpoint: ""
    attributes:
      kubernetes:
        enable: true
      select:
        obi_network_flow_bytes:
          include:
            - k8s.src.namespace
            - k8s.src.owner.type
            - k8s.src.owner.name
            - k8s.dst.namespace
            - k8s.dst.owner.type
            - k8s.dst.owner.name
            - src.address
            - dst.address
            - dst.port
            - transport
            - direction
    network:
      enable: true
{{- end }}
