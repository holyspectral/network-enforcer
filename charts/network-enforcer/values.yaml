controller:
  args:
  - --metrics-bind-address=:8443
  - --leader-elect
  - --health-probe-bind-address=:8081
  env: []
  containerSecurityContext:
    runAsUser: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  image:
    repository: ghcr.io/rancher-sandbox/network-enforcer/controller
    tag: v0.1.0
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 500m
      memory: 512Mi
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  replicas: 1
  serviceAccount:
    annotations: {}
  tolerations: []
  podLabels: {}
  podAnnotations: {}
  nodeSelector: {}
  affinity: {}
  drainFlowsInterval: 30s

kubernetesClusterDomain: cluster.local
imagePullSecrets: []

# The original dependency name is needed for Helm v4 dependency processing.
# @schema additionalProperties:true
opentelemetry-ebpf-instrumentation: {}

# Settings for opentelemetry-ebpf-instrumentation
# @schema additionalProperties:true
obi:
  enabled: true
  preset: network
  # opentelemetry-ebpf-instrumentation config
  # @schema additionalProperties:true
  config:
    # opentelemetry-ebpf-instrumentation config data block
    # @schema additionalProperties:true
    data:
      otel_metrics_export:
        endpoint: http://network-enforcer-otlp:4317
        interval: 30s
      otel_traces_export:
        endpoint: ""
      attributes:
        kubernetes:
          enable: true
        select:
          obi_network_flow_bytes:
            include: ["*"]
      metrics:
        features:
          - network

cniwatcher:
  enabled: true
  # Valid values: aws-vpc, calico, cilium, flannel
  cniType: calico
  # Port for the gRPC ScrapeViolations server. The controller scrapes violations
  # from each cniwatcher pod on this port.
  grpcPort: 50051
  # mTLS configuration for the gRPC ScrapeViolations server. When enabled, the
  # controller and cniwatcher authenticate each other via mutual TLS. The cert
  # directory is typically provided by a Secret or projected volume containing
  # tls.crt, tls.key, and ca.crt.
  # When disabled (default), the gRPC server runs in insecure mode, suitable
  # for dev/kind testing where the node network is trusted.
  mtls:
    enabled: false
    # Directory where TLS certificates are mounted. Defaults to
    # /etc/network-enforcer/certs when mtls.enabled is true.
    certDir: /etc/network-enforcer/certs
  podSecurityContext:
    runAsNonRoot: true # this should be false for aws-vpc
    seccompProfile:
      type: RuntimeDefault
    # for flannel uncomment the following
    # fsGroup: 4
  image:
    repository: ghcr.io/rancher-sandbox/network-enforcer/cniwatcher
    tag: v0.1.0
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  containerSecurityContext:
    runAsUser: 1000 # If CNI type is aws-vpc it needs to be 0.
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  # Empty string uses {{ release-name }}-otlp.{{ namespace }}.svc.cluster.local:4317
  otelEndpoint: ""
  calico:
    goldmaneEndpoint: goldmane.calico-system.svc:7443
  cilium:
    hubbleEndpoint: unix:///var/run/cilium/hubble.sock
  serviceAccount:
    annotations: {}
