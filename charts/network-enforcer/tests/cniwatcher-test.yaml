suite: "CNI Watcher DaemonSet Tests"
templates:
  - "templates/cniwatcher/daemonset.yaml"

tests:
  - it: "should deploy cniwatcher in release namespace"
    release:
      namespace: example-namespace
    asserts:
      - equal:
          path: "metadata.namespace"
          value: "example-namespace"

  - it: "should allow image, and imagePullPolicy to be overridden"
    set:
      cniwatcher:
        image:
          repository: somewhere/cniwatcher
          tag: v9.9.9
          pullPolicy: Always
    asserts:
      - equal:
          path: "spec.template.spec.containers[0].image"
          value: "somewhere/cniwatcher:v9.9.9"
      - equal:
          path: "spec.template.spec.containers[0].imagePullPolicy"
          value: "Always"

  - it: "should always include the mTLS cert-dir arg"
    asserts:
      - contains:
          path: "spec.template.spec.containers[0].args"
          content: "--grpc-mtls-cert-dir=/etc/network-enforcer/certs"

  - it: "should mount the cert-manager CSI certificate volume"
    asserts:
      - exists:
          path: "spec.template.spec.containers[0].volumeMounts[?(@.name == 'cniwatcher-mtls-certs')]"
      - equal:
          path: "spec.template.spec.containers[0].volumeMounts[?(@.name == 'cniwatcher-mtls-certs')].mountPath"
          value: "/etc/network-enforcer/certs"
      - equal:
          path: "spec.template.spec.containers[0].volumeMounts[?(@.name == 'cniwatcher-mtls-certs')].readOnly"
          value: true

  - it: "should provision the server certificate via the cert-manager CSI driver"
    release:
      name: network-enforcer
      namespace: example-namespace
    asserts:
      - exists:
          path: "spec.template.spec.volumes[?(@.name == 'cniwatcher-mtls-certs')].csi"
      - equal:
          path: "spec.template.spec.volumes[?(@.name == 'cniwatcher-mtls-certs')].csi.driver"
          value: "csi.cert-manager.io"
      - equal:
          path: "spec.template.spec.volumes[?(@.name == 'cniwatcher-mtls-certs')].csi.volumeAttributes['csi.cert-manager.io/issuer-name']"
          value: "network-enforcer-ca"
      - equal:
          path: "spec.template.spec.volumes[?(@.name == 'cniwatcher-mtls-certs')].csi.volumeAttributes['csi.cert-manager.io/dns-names']"
          value: "${POD_NAME}.${POD_NAMESPACE}"
