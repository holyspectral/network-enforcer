apiVersion: security.rancher.io/v1alpha1
kind: WorkloadNetworkPolicy
metadata:
  name: networkpolicy-sample
spec:
  mode: protect
  policyTemplate:
    podSelector: {}
    policyTypes:
      - Ingress
      - Egress
    ingress:
    - from:
      - podSelector: {}
    egress:
    - to:
      - podSelector: {}
